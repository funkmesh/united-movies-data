name: Update catalog

# Harvests United's catalog, enriches new titles (OMDb ratings + Wikidata awards),
# and publishes the feed to GitHub Pages — but only redeploys when content changed
# (keeps the ETag stable so the app gets cheap 304s).

on:
  schedule:
    - cron: "0 9 * * *" # daily at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build catalog
        id: build
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        if: steps.build.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.build.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
